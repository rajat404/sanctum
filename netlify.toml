[build]
publish = "public"
command = "PATH=$PWD/node_modules/.bin:$PATH hugo --gc --minify"

[context.production.environment]
HUGO_VERSION = "0.159.1"
HUGO_ENV = "production"
HUGO_ENABLEGITINFO = "false"

[context.split1]
command = "PATH=$PWD/node_modules/.bin:$PATH hugo --gc --minify --enableGitInfo"

[context.split1.environment]
HUGO_VERSION = "0.159.1"
HUGO_ENV = "production"

[context.deploy-preview]
command = "PATH=$PWD/node_modules/.bin:$PATH hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.deploy-preview.environment]
HUGO_VERSION = "0.159.1"

[context.branch-deploy]
command = "PATH=$PWD/node_modules/.bin:$PATH hugo --gc --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy.environment]
HUGO_VERSION = "0.159.1"

[context.next.environment]
HUGO_ENABLEGITINFO = "false"

